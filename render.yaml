services:
  - type: web
    name: fairlens
    runtime: node
    plan: free
    buildCommand: npm install && pip install -r requirements.txt
    startCommand: node server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
